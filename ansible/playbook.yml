---
# ========== 场景1：系统基线加固（对应你理论的安全基线） ==========
- name: 安全基线 & 通用初始化
  hosts: production
  gather_facts: yes
  tasks:
    - name: 确保所有节点时区统一 (上海)
      timezone:
        name: Asia/Shanghai
    - name: 安装基础监控工具 (模拟资产采集)
      apt:
        name: ['curl', 'net-tools', 'htop']
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

# ========== 场景2：滚动部署 Nginx (对应你理论的部署自动化) ==========
- name: 多节点滚动发布业务
  hosts: production
  serial: 1                     # 核心：每次只动1台，实现0停机
  become: yes
  tasks:
    - name: 模拟拉取最新代码 (写版本标记)
      shell: echo "Deploy v2.0 - $(date)" > /tmp/app_version.txt
    
    - name: 安装 Nginx (演示服务生命周期)
      apt:
        name: nginx
        state: present
    
    - name: 启动服务并设置开机自启
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: 健康检查 (模拟业务探针)
      uri:
        url: http://localhost
        status_code: 200
        timeout: 3
      register: health_result
      ignore_errors: no
    
    - debug:
        msg: "✅ 节点 {{ inventory_hostname }} 部署成功，版本已更新"

# ========== 场景3：故障自愈模拟 (对应你理论的监控告警) ==========
- name: 故障自愈守护 (模拟看门狗)
  hosts: production
  tasks:
    - name: 检查 Nginx 进程存活
      shell: pgrep -c nginx
      register: process_count
      ignore_errors: yes
    
    - name: 若进程崩溃则自动重启
      service:
        name: nginx
        state: restarted
      when: process_count.stdout == "0" or process_count is failed
      
    - name: 触发模拟告警到终端
      debug:
        msg: "🚨 警告：节点 {{ inventory_hostname }} 刚刚发生自动重启！"
      when: process_count.stdout == "0"